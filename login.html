<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - LENTERA BELAJAR Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">

    <div class="login-card">
        <header class="login-header">
            <h1 class="logo login-logo">LENTERA BELAJAR</h1>
            <p class="login-subtitle">Illuminating your educational journey.</p>
        </header>

        <form id="formLogin">
            <div class="input-group">
                <label for="nama" class="input-label">Nama Lengkap</label>
                <input type="text" id="nama" class="input-field" placeholder="Masukkan Nama Anda" required>
            </div>

            <div class="input-group">
                <label for="username" class="input-label">Nomor Induk Siswa (NIS)</label>
                <input type="text" id="username" class="input-field" placeholder="Masukkan NIS Anda" 
                       inputmode="numeric" 
                       pattern="[0-9]*" 
                       oninput="this.value = this.value.replace(/[^0-9]/g, '');" 
                       required>
            </div>
            
            <div class="input-group">
                <label for="password" class="input-label">Kata Sandi</label>
                <input type="password" id="password" class="input-field" placeholder="••••••••" required>
            </div>

            <button type="submit" id="btnSubmit" class="login-btn">Masuk ke Portal</button>
        </form>

        <a href="#" class="forgot-password">Lupa Kata Sandi? Hubungi Akademik</a>

        <script>
           document.getElementById('formLogin').addEventListener('submit', async function(e) {
                e.preventDefault(); 
                
                const btn = document.getElementById('btnSubmit');
                const nama = document.getElementById('nama').value;
                const nis = document.getElementById('username').value;
                const password = document.getElementById('password').value;

                btn.innerHTML = 'Memproses...';
                btn.style.opacity = '0.8';
                btn.disabled = true;

                try {
                    // MENGIRIM DATA KE NETLIFY FUNCTIONS (DATABASE)
                    const response = await fetch('/.netlify/functions/login', {
                        method: 'POST',
                        body: JSON.stringify({ nama, nis, password }),
                        headers: { 'Content-Type': 'application/json' }
                    });

                    const result = await response.json();

                    if (result.success) {
                        // Jika berhasil (Login atau Daftar Baru)
                        // Simpan nama dan nis ke memori browser untuk dashboard
                        localStorage.setItem('userName', result.data.nama);
                        localStorage.setItem('userNIS', result.data.nis);
                        
                        window.location.href = 'dashboard.html';
                    } else {
                        // Jika gagal (Misal password salah)
                        alert(result.message);
                        btn.innerHTML = 'Masuk ke Portal';
                        btn.style.opacity = '1';
                        btn.disabled = false;
                    }
                } catch (error) {
                    alert('Terjadi gangguan jaringan saat menghubungi server.');
                    btn.innerHTML = 'Masuk ke Portal';
                    btn.style.opacity = '1';
                    btn.disabled = false;
                }
            });
        </script>
    </div>

</body>
</html>
