<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Refleksi Pembelajaran - LENTERA BELAJAR</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .sub-header { background: var(--primary-dark); padding: 20px 2rem; display: flex; align-items: center; gap: 20px; color: white; border-bottom: 4px solid var(--accent-glow); }
        .back-btn { color: white; font-size: 1.2rem; transition: color 0.3s; }
        .back-btn:hover { color: var(--accent-glow); }
        .page-content { padding: 3rem 2rem; max-width: 1000px; margin: 0 auto; }
        
        .exam-banner { background: linear-gradient(135deg, var(--primary-dark), #1E293B); border-radius: 16px; padding: 2.5rem; color: white; display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; box-shadow: var(--shadow-premium); }
        .exam-banner h2 { font-family: 'Poppins', sans-serif; font-size: 1.8rem; margin-bottom: 0.5rem; color: var(--accent-glow); }
        
        /* Wadah Khusus untuk Game ZEP */
        .game-wrapper {
            position: relative;
            width: 100%;
            height: 600px; /* Tinggi game */
            background-color: #F1F5F9;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: var(--shadow-premium);
            border: 2px solid #E2E8F0;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .game-wrapper iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .fallback-text {
            text-align: center;
            margin-top: 15px;
            font-size: 0.9rem;
            color: #64748b;
        }
        .fallback-text a {
            color: var(--accent-glow);
            font-weight: 600;
            text-decoration: underline;
        }
    </style>
</head>
<body style="background-color: var(--bg-light);">

    <header class="sub-header">
        <a href="dashboard.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
        <h2 style="font-family: 'Poppins', sans-serif; font-size: 1.5rem;">Refleksi Interaktif</h2>
    </header>

    <main class="page-content">
        
        <div class="exam-banner">
            <div>
                <h2>Misi Refleksi: Uji Pemahamanmu!</h2>
                <p style="color: #CBD5E1;"><i class="fas fa-gamepad"></i> Game Edukasi Interaktif | <i class="fas fa-trophy"></i> Selesaikan Misi untuk Skor Maksimal</p>
                <p style="margin-top: 10px; font-size: 0.9rem; color: #94A3B8;">Terapkan pemahamanmu tentang harmoni dan konflik sosial melalui simulasi di bawah ini.</p>
            </div>
        </div>

        <div class="game-wrapper">
            <iframe src="https://quiz.zep.us/id/play/KwAwpM" allow="autoplay; fullscreen" title="Refleksi Game ZEP"></iframe>
        </div>
        
        <p class="fallback-text">
            Game tidak muncul atau layar terlalu kecil? <a href="https://quiz.zep.us/id/play/KwAwpM" target="_blank">Klik di sini untuk bermain layar penuh</a>.
        </p>

    </main>

</body>
</html>
