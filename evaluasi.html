<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evaluasi - LENTERA BELAJAR</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .sub-header { background: var(--primary-dark); padding: 20px 2rem; display: flex; align-items: center; gap: 20px; color: white; border-bottom: 4px solid var(--accent-glow); }
        .back-btn { color: white; font-size: 1.2rem; transition: color 0.3s; }
        .back-btn:hover { color: var(--accent-glow); }
        .page-content { padding: 3rem 2rem; max-width: 900px; margin: 0 auto; }
        
        .exam-banner { background: linear-gradient(135deg, var(--primary-dark), #1E293B); border-radius: 16px; padding: 2.5rem; color: white; display: flex; justify-content: space-between; align-items: center; margin-bottom: 3rem; box-shadow: var(--shadow-premium); }
        .exam-banner h2 { font-family: 'Poppins', sans-serif; font-size: 1.8rem; margin-bottom: 0.5rem; color: var(--accent-glow); }
        .btn-start { background: var(--accent-glow); color: var(--primary-dark); padding: 15px 30px; border-radius: 50px; font-weight: bold; font-size: 1.1rem; border: none; cursor: pointer; transition: transform 0.2s; box-shadow: 0 4px 15px rgba(245, 158, 11, 0.3); }
        .btn-start:hover { transform: scale(1.05); }

        .history-table { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; overflow: hidden; box-shadow: var(--shadow-subtle); }
        .history-table th { background: #F1F5F9; color: var(--primary-dark); font-weight: 700; text-align: left; padding: 15px 20px; font-family: 'Poppins', sans-serif; }
        .history-table td { padding: 15px 20px; border-bottom: 1px solid #E2E8F0; color: #475569; }
        .score-badge { background: #D1FAE5; color: #065F46; padding: 5px 12px; border-radius: 20px; font-weight: bold; font-size: 0.9rem; }
    </style>
</head>
<body style="background-color: var(--bg-light);">

    <header class="sub-header">
        <a href="dashboard.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
        <h2 style="font-family: 'Poppins', sans-serif; font-size: 1.5rem;">Uji Kompetensi</h2>
    </header>

    <main class="page-content">
        
        <div class="exam-banner">
            <div>
                <h2>Ujian Akhir Modul (Post-Test)</h2>
                <p style="color: #CBD5E1;"><i class="far fa-clock"></i> Waktu: 45 Menit | <i class="far fa-file-alt"></i> 30 Soal Pilihan Ganda</p>
                <p style="margin-top: 10px; font-size: 0.9rem; color: #94A3B8;">Batas Pengerjaan: Hari ini, 23:59 WIB</p>
            </div>
            <button class="btn-start">Mulai Ujian <i class="fas fa-play" style="margin-left: 5px;"></i></button>
        </div>

        <h3 style="color: var(--primary-dark); font-family: 'Poppins', sans-serif; margin-bottom: 1rem;">Riwayat Nilai</h3>
        <table class="history-table">
            <thead>
                <tr>
                    <th>Nama Evaluasi</th>
                    <th>Tanggal</th>
                    <th>Status</th>
                    <th>Nilai</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Pre-Test Bab 1</td>
                    <td>10 Mar 2026</td>
                    <td><span style="color: #059669; font-weight: 600;"><i class="fas fa-check-circle"></i> Selesai</span></td>
                    <td><span class="score-badge">85 / 100</span></td>
                </tr>
                <tr>
                    <td>Kuis Singkat Peta Konflik</td>
                    <td>15 Mar 2026</td>
                    <td><span style="color: #059669; font-weight: 600;"><i class="fas fa-check-circle"></i> Selesai</span></td>
                    <td><span class="score-badge" style="background: #FEF3C7; color: #92400E;">70 / 100</span></td>
                </tr>
            </tbody>
        </table>

    </main>

</body>
</html>
